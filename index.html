<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Évasion Orbitale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Panneau de contrôle sur le côté */
        #ui-panel {
            width: 300px;
            background: rgba(16, 16, 32, 0.9);
            border-right: 2px solid #45A29E;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 2px 0 15px rgba(69, 162, 158, 0.3);
        }

        h1 {
            font-size: 24px;
            color: #66FCF1;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
            text-align: center;
            margin-top: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: #45A29E;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #66FCF1;
            color: #0b0c10;
            box-shadow: 0 0 15px #66FCF1;
        }

        button.stop-btn {
            background: #ff4c4c;
        }

        button.stop-btn:hover {
            background: #ff7f7f;
            box-shadow: 0 0 15px #ff4c4c;
        }

        #status {
            text-align: center;
            font-size: 14px;
            color: #aaaaaa;
        }

        /* Conteneur de la simulation */
        #simulation-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .bottom-text {
            position: absolute;
            bottom: 5%;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>🚀 OrbitGen 1.0</h1>
        
        <div class="control-group">
            <button id="start-record">🔴 Démarrer l'enregistrement</button>
            <button id="stop-record" class="stop-btn" style="display: none;">⏹️ Arrêter & Télécharger</button>
        </div>
        
        <p id="status">En attente...</p>
        
        <div style="margin-top: auto; font-size: 12px; color: #666; text-align: center;">
            <p>Astuce : Clique d'abord sur "Démarrer l'enregistrement" pour autoriser le son du navigateur.</p>
        </div>
    </div>

    <div id="simulation-container">
        <div class="bottom-text">+2 per escape</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;

        // 1. CONFIGURATION DE LA PHYSIQUE
        const engine = Engine.create({ gravity: { x: 0, y: 0 } }); // Gravité zéro
        
        // Dimensions idéales pour TikTok (Vertical)
        const renderWidth = 450;
        const renderHeight = 800;

        const render = Render.create({
            element: document.getElementById('simulation-container'),
            engine: engine,
            options: {
                width: renderWidth,
                height: renderHeight,
                wireframes: false,
                background: 'transparent',
                pixelRatio: window.devicePixelRatio // Ultra-fluide
            }
        });

        const centerX = renderWidth / 2;
        const centerY = renderHeight / 2;
        const ringRadius = 170;
        const ballSpeed = 7;

        // 2. CRÉATION DU CERCLE
        const segments = 60;
        const wallData = [];
        const circumference = 2 * Math.PI * ringRadius;
        const rectWidth = (circumference / segments) + 2; 

        for (let i = 0; i < segments; i++) {
            if (i >= 0 && i <= 6) continue; // La porte ouverte

            const baseAngle = (i / segments) * Math.PI * 2;
            const x = centerX + Math.cos(baseAngle) * ringRadius;
            const y = centerY + Math.sin(baseAngle) * ringRadius;

            const wall = Bodies.rectangle(x, y, rectWidth, 6, {
                isStatic: true,
                angle: baseAngle,
                render: { fillStyle: '#ffffff' },
                restitution: 1,
                friction: 0
            });
            
            wallData.push({ body: wall, baseAngle: baseAngle });
            Composite.add(engine.world, wall);
        }

        // Le son "Bruh"
        const bruhSoundUrl = "https://www.myinstants.com/media/sounds/movie_1.mp3";

        // 3. FONCTION DE CRÉATION DE BALLES
        function createBall(x, y) {
            const colors = ['#66FCF1', '#C5A3FF', '#45A29E', '#FFFFFF', '#FFFF00'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const ball = Bodies.circle(x, y, 9, {
                restitution: 1, 
                friction: 0, 
                frictionAir: 0, 
                frictionStatic: 0,
                render: { fillStyle: color },
                collisionFilter: { group: -1 }, // Les balles se traversent
                bullet: true // Empêche de traverser les murs à haute vitesse
            });
            
            const randomAngle = Math.random() * Math.PI * 2;
            Body.setVelocity(ball, { 
                x: Math.cos(randomAngle) * ballSpeed, 
                y: Math.sin(randomAngle) * ballSpeed 
            });
            return ball;
        }

        let balls = [createBall(centerX, centerY)];
        Composite.add(engine.world, balls);

        // 4. ANIMATION ET LOGIQUE
        let currentRotation = 0;
        
        Events.on(engine, 'beforeUpdate', () => {
            currentRotation += 0.02; // Vitesse de l'anneau
            wallData.forEach(item => {
                const newAngle = item.baseAngle + currentRotation;
                const newX = centerX + Math.cos(newAngle) * ringRadius;
                const newY = centerY + Math.sin(newAngle) * ringRadius;
                Body.setPosition(item.body, { x: newX, y: newY });
                Body.setAngle(item.body, newAngle);
            });
        });

        Events.on(engine, 'afterUpdate', () => {
            balls.forEach((ball) => {
                // Maintien de la vitesse laser
                const speed = Vector.magnitude(ball.velocity);
                if (speed > 0 && Math.abs(speed - ballSpeed) > 0.1) {
                    const normalized = Vector.normalise(ball.velocity);
                    Body.setVelocity(ball, Vector.mult(normalized, ballSpeed));
                }

                const dist = Vector.magnitude(Vector.sub(ball.position, { x: centerX, y: centerY }));
                
                // Si la balle franchit la porte
                if (dist > ringRadius + 30) {
                    const audio = new Audio(bruhSoundUrl);
                    audio.volume = 0.5;
                    audio.play().catch(() => {}); // Joue le son si autorisé

                    Body.setPosition(ball, { x: centerX, y: centerY });
                    const angle1 = Math.random() * Math.PI * 2;
                    Body.setVelocity(ball, { x: Math.cos(angle1) * ballSpeed, y: Math.sin(angle1) * ballSpeed });

                    // Ajout de balles (limite à 120 pour zéro lag)
                    if (balls.length < 120) { 
                        for (let i = 0; i < 2; i++) {
                            const newBall = createBall(centerX, centerY);
                            balls.push(newBall);
                            Composite.add(engine.world, newBall);
                        }
                    }
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // 5. SYSTÈME D'ENREGISTREMENT VIDÉO (MediaRecorder)
        let mediaRecorder;
        let recordedChunks = [];
        const btnStart = document.getElementById('start-record');
        const btnStop = document.getElementById('stop-record');
        const statusText = document.getElementById('status');

        btnStart.addEventListener('click', () => {
            // Récupère le canvas généré par Matter.js
            const canvas = document.querySelector('canvas');
            if (!canvas) return;

            // Capture à 60 FPS
            const stream = canvas.captureStream(60);
            
            // Format d'enregistrement
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = () => {
                // Crée le fichier vidéo final
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                // Lance le téléchargement automatiquement
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tiktok-evasion.webm';
                a.click();
                
                window.URL.revokeObjectURL(url);
                statusText.innerText = "Vidéo téléchargée !";
            };

            mediaRecorder.start();
            
            // Met à jour l'interface
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            statusText.innerText = "🔴 Enregistrement en cours...";
            statusText.style.color = "#ff4c4c";
        });

        btnStop.addEventListener('click', () => {
            mediaRecorder.stop();
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            statusText.style.color = "#aaaaaa";
        });

    </script>
</body>
</html>
